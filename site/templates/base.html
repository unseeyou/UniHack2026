<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NSW Logbook{% endblock %}</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Bootstrap frontend css -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- css file link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Public Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <button style="position: fixed; top: 10px; right: 10px" onclick="logs.hidden = !logs.hidden" class="btn btn-secondary">Show Logs</button>
    <div id="logs" style="position: fixed; top: 50px; left: 50px; right: 50px; bottom: 50px; background: black; z-index: 100000; overflow: auto" class="card" hidden>
        <h1 class="card-title">Logs</h1>
    </div>

    <script src="{{ url_for('static', filename='js/log.js') }}"></script>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Load Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register("/sw.js").then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
