{% extends "base.html" %}

{% block extra_head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/log_book/new.css') }}" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{% endblock %}

{% block title %}Record New Trip{% endblock %}

{% block content %}
<div id="map" class="position-absolute top-0 bottom-0 start-0 end-0 z-n1">
    <div class="d-flex align-items-center justify-content-center h-100 text-center">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>

<h1 id="trip-stats" class="d-inline offcanvas offcanvas-top text-center mx-auto bg-light rounded-bottom-4 p-3" style="width: fit-content; height: fit-content"
    data-bs-scroll="true" data-bs-backdrop="false">
    Time Elapsed <span id="timer">00:00:00</span>
</h1>

<div class="d-flex position-absolute bottom-0 start-0 end-0 m-4 gap-4">
    <button id="start-btn" class="btn btn-success flex-fill" data-bs-toggle="modal" data-bs-target="#odometer-modal" onclick="startTrip()">Start Trip</button>

    <!-- Odometer Input -->
     <div class="modal fade" id="odometer-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Starting Odometer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="number" id="odometer-input" class="form-control" placeholder="e.g. 12450" min="0">
                </div>

                <div class="model-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="confirmStart()">Confirm & Start</button>
                </div>
                
            </div>
        </div>
     </div>

    <button id="end-btn" class="btn btn-danger flex-fill" data-bs-dismiss="offcanvas" data-bs-target="#trip-stats" onclick="stopTrip()" hidden>End Trip</button>
</div>

<script src="/static/js/log_book/new.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
