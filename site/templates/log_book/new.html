{% extends "base.html" %}

{% block title %}Add Log Entry{% endblock %}

{% block content %}
<script src="/static/js/geolocation.js" onload="disableGeo()"></script>

<div>
    <h1>NSW Learner Logbook</h1>

    <div id="trip-stats">
        <p>Time: <span id="timer">00:00:00</span></p>
    </div>

    <button id="start-btn" onclick="enableGeo()">Start Trip</button>
    <button id="end-btn" onclick="disableGeo()">End Trip</button>

</div>
{% endblock %}
